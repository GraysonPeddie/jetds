#
# handling systemd on target.
---

units:
   - name: "NetworkManager"
     action: "enable"
     mandatory: false

   - name: "systemd-timesyncd"
     action: "enable"
     mandatory: false

   - name: "systemd-timesyncd"
     action: "enable"
     mandatory: false

   - name: "firewalld"
     action: "enable"
     mandatory: false

   - name: "cockpit.socket"
     action: "enable"
     mandatory: false

   - name: "named"
     action: "enable"
     mandatory: false

   - name: "fstrim"
     action: "enable"
     mandatory: false

   - name:  "pacman-init"
     action: "mask"
     mandatory:  false
